# nginx site template for the regulatory system.
#
# Edit before installing:
#   - `listen 80;` → production default; use 8080 (or similar) when coexisting
#     with a dev install on the same host.
#   - `server_name` → your domain (or `localhost` for a coexistence rehearsal).
#   - `proxy_pass` ports → 8000 production default; 8001 when coexisting.
#
# Django admin's static files are merged into /var/www/regulatory_frontend/
# during setup (step 8), so both React and Django share nginx's /static/
# path without a separate `location /static/` alias.

server {
    listen 80;
    server_name your-domain.example.com;

    root /var/www/regulatory_frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 20M;
}
